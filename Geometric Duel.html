<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Draw Duel: Grand Finale Edition</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 600px;
            height: 400px;
            background-color: #333;
            border: 4px solid #fff;
            display: flex;
            align-items: flex-end;
            padding-bottom: 50px;
            box-sizing: border-box;
        }

        /* --- THE BALL (PLAYER) --- */
        #player {
            position: absolute;
            left: 80px;
            bottom: 50px;
            width: 60px;
            height: 60px;
            background-color: #ff65a3; /* Kirby Pink */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            box-sizing: border-box;
            padding-right: 12px;
            transform-origin: bottom center;
            transition: opacity 0.1s, background-color 0.2s;
            z-index: 4;
        }

        .ball-eyes {
            display: flex;
            gap: 4px;
        }

        .ball-eye {
            width: 6px;
            height: 10px;
            background-color: #333;
            border-radius: 50%;
            animation: blink 4s infinite;
        }

        /* --- THE OPPONENTS --- */
        #opponent {
            position: absolute;
            right: 80px;
            bottom: 50px;
            width: 60px;
            height: 60px;
            background-color: #ffd15c; /* Default Square Yellow */
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            transform-origin: center center;
            transition: all 0.05s ease-out;
            z-index: 3;
        }

        #opponent.rhombus {
            background-color: #4da6ff; 
            transform: rotate(45deg) scale(0.8);
        }

        #opponent.triangle {
            background-color: #9b5de5; 
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }

        #opponent.pentagon {
            background-color: #06d6a0; 
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
        }

        #opponent.hexagon {
            background-color: #ff595e; 
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }

        .square-eyes {
            display: flex;
            gap: 8px;
            transition: transform 0.2s ease-out;
        }

        #opponent.rhombus .square-eyes { transform: rotate(-45deg); }
        #opponent.triangle .square-eyes { transform: translateY(12px); }
        #opponent.pentagon .square-eyes { transform: translateY(6px); }
        #opponent.hexagon .square-eyes { transform: scale(1.1); }

        .square-eye {
            position: relative;
            width: 8px;
            height: 8px;
            background-color: #333;
            border-radius: 50%;
        }

        /* --- STAGE STYLES & PROPS --- */
        #flames {
            position: absolute;
            width: 40px;
            height: 50px;
            background: linear-gradient(to top, rgba(255,68,68,0), #ff9900, #ffcc00, white);
            clip-path: polygon(50% 100%, 0% 0%, 100% 0%);
            display: none;
            z-index: 2;
            transform-origin: top center;
        }
        #opponent.triangle-ram #flames {
            display: block;
            top: 5px;
            left: 55px;
            transform: rotate(-90deg); 
            animation: flicker 0.1s infinite alternate;
        }

        /* TNT Elements */
        #tnt-crate { position: absolute; width: 45px; height: 45px; background-color: #cc3333; border: 2px dashed #661111; bottom: 50px; display: none; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #fff; z-index: 2; }
        #tnt-crate::before { content: 'TNT'; }
        #tnt-plunger { position: absolute; width: 30px; height: 30px; background-color: #a0522d; bottom: 50px; display: none; z-index: 2; }
        #tnt-plunger::after { content: ''; position: absolute; top: -12px; left: 13px; width: 4px; height: 12px; background-color: #777; }
        #tnt-plunger.pressed::after { top: -2px; height: 2px; }
        #fuse-line { position: absolute; height: 4px; background-color: #8b5a2b; bottom: 55px; display: none; z-index: 1; }
        #fuse-spark { position: absolute; width: 8px; height: 8px; background-color: #ffcc00; border-radius: 50%; box-shadow: 0 0 8px #ff3300; bottom: 53px; display: none; z-index: 2; }
        #explosion-cloud { position: absolute; width: 100px; height: 100px; background-color: #ffcc00; border: 8px solid #ff3300; border-radius: 50%; bottom: 30px; left: 440px; transform: scale(0); z-index: 6; display: none; pointer-events: none; box-shadow: 0 0 30px #ff6600; }
        #explosion-cloud.boom { display: block; animation: blastWave 0.4s ease-out forwards; }

        #glass-box { position: absolute; left: 260px; bottom: 450px; width: 80px; height: 80px; background-color: rgba(255, 255, 255, 0.25); border: 4px solid #e0f7fa; box-shadow: 0 0 15px rgba(224, 247, 250, 0.5); border-radius: 4px; display: none; z-index: 5; }

        /* Hexagon Win/Lose Props */
        #laser-grid {
            position: absolute;
            left: 445px;
            bottom: 50px;
            width: 90px;
            height: 90px;
            background: linear-gradient(90deg, transparent 45%, #00f0ff 48%, #00f0ff 52%, transparent 55%),
                        linear-gradient(0deg, transparent 45%, #00f0ff 48%, #00f0ff 52%, transparent 55%);
            background-size: 15px 15px;
            border: 3px dashed #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
            display: none;
            z-index: 5;
        }
        #laser-grid.active {
            display: block;
            animation: laserCageShrink 0.6s ease-in forwards;
        }

        #honeycomb-prison {
            position: absolute;
            left: 80px;
            bottom: 45px;
            width: 70px;
            height: 70px;
            background-color: rgba(255, 195, 0, 0.3);
            border: 4px solid #ffc300;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            box-shadow: 0 0 15px #ffc300;
            display: none;
            z-index: 5;
        }

        /* --- POP/STRIKE TEXT EFFECT --- */
        #pop-effect {
            position: absolute;
            left: 80px;
            bottom: 110px;
            transform: translate(-50%, -50%) scale(0);
            font-size: 60px;
            font-weight: bold;
            color: #ff3333;
            -webkit-text-stroke: 2px white;
            text-shadow: 2px 2px 0px #000;
            text-transform: uppercase;
            z-index: 10;
            pointer-events: none;
            display: none;
        }

        /* --- STAT PANEL --- */
        #stat-panel {
            font-size: 16px;
            margin-bottom: 15px;
            color: #aaa;
        }
        #stat-panel span {
            color: #00f0ff;
            font-weight: bold;
        }

        /* --- ANIMATIONS --- */
        #player.victory-leap { animation: leapFrogAttack 1.1s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }
        #opponent.mid-stage-squish { right: auto !important; left: 270px; animation: getSquished 1.1s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }
        #opponent.rhombus-captured { right: auto; left: 270px; transform: rotate(45deg) scale(0.8); transition: left 0.1s; }
        #glass-box.drop-down { display: block; animation: glassDrop 0.5s forwards cubic-bezier(0.6, -0.28, 0.735, 0.045); }

        #player.bowling-charge { background-color: #444a54 !important; animation: bowlingRollAllTheWay 0.55s forwards cubic-bezier(0.5, 0.05, 0.85, 0.3); }
        #opponent.pin-blast { right: auto; left: 460px; animation: pinSpinFlyFromStart 0.6s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #player.detonator-hop-win { animation: tntHopWin 0.35s forwards ease-out; }
        #player.detonator-hop-lose { animation: tntHopLose 0.35s forwards ease-out; }
        #opponent.explode-disappear { animation: puffAway 0.1s 0.1s forwards; }

        /* Hexagon Slicing & Charging */
        #player.hacker-glow { background-color: #00f0ff !important; box-shadow: 0 0 20px #00f0ff; }
        #opponent.sliced { animation: sliceCollapse 0.5s 0.5s forwards ease-in; }
        #opponent.hexagon-charge { right: auto; animation: hexPrisonDash 0.3s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94); }

        /* Losses Styles */
        #player.flattened { height: 20px; border-radius: 40% 40% 10% 10%; }
        #opponent.jumping { right: auto; left: 80px; animation: trampolineJump 0.6s infinite ease-in-out; }
        #opponent.jumping .square-eye { height: 4px; border-radius: 0; transform: skewY(15deg); }
        #opponent.rhombus-trampoline { right: auto !important; left: 80px !important; animation: rhombusSharpJump 2.5s forwards cubic-bezier(0.25, 0.1, 0.25, 1); }
        #opponent.triangle-ram { right: auto; animation: triangleRamAttack 0.4s forwards cubic-bezier(0.6, 0.04, 0.98, 0.33); }
        #player.trapped { animation: panicBounce 0.15s infinite alternate; }
        #player.popped { animation: balloonPop 0.15s forwards ease-out; }
        #pop-effect.active { display: block; animation: popTextEffect 0.4s forwards ease-out; }

        /* --- KEYFRAMES --- */
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 55% { transform: scaleY(0.1); } }
        @keyframes flicker { 0% { transform: rotate(-90deg) scaleY(0.9); } 100% { transform: rotate(-90deg) scaleY(1.2) scaleX(1.1); } }
        @keyframes glassDrop { 0% { bottom: 450px; } 100% { bottom: 42px; } }
        @keyframes trampolineJump { 0%, 100% { bottom: 50px; transform: scaleY(0.8) scaleX(1.2); } 50% { bottom: 180px; transform: scaleY(1.2) scaleX(0.8); } }
        @keyframes leapFrogAttack { 0% { left: 80px; bottom: 50px; } 20% { left: 175px; bottom: 150px; } 40% { left: 270px; bottom: 200px; } 48% { left: 270px; bottom: 50px; } 65% { left: 330px; bottom: 130px; } 85% { left: 400px; bottom: 150px; } 100% { left: 460px; bottom: 50px; } }
        @keyframes getSquished { 0%, 46% { height: 60px; background-color: #ffd15c; } 48% { height: 12px; background-color: #555; opacity: 0.7; border-radius: 5px; } 100% { height: 12px; background-color: #555; opacity: 0.5; border-radius: 5px; } }
        @keyframes rhombusSharpJump { 0% { bottom: 50px; transform: rotate(45deg) scale(0.8); } 14% { bottom: 180px; transform: rotate(45deg) scale(0.8); } 24% { bottom: 70px; transform: rotate(45deg) scale(0.8); } 100% { bottom: 50px; transform: rotate(45deg) scale(0.8); } }
        @keyframes bowlingRollAllTheWay { 0% { left: 80px; transform: rotate(0deg); } 100% { left: 410px; transform: rotate(480deg); } }
        @keyframes pinSpinFlyFromStart { 0% { left: 460px; bottom: 50px; transform: scale(1) rotate(0deg); } 100% { left: 750px; bottom: 320px; transform: scale(0.5) rotate(540deg); opacity: 0; } }
        @keyframes triangleRamAttack { 0% { left: 460px; transform: rotate(-90deg); } 100% { left: 130px; transform: rotate(-90deg); } }
        @keyframes puffAway { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }
        @keyframes tntHopWin { 0% { left: 80px; bottom: 50px; } 50% { bottom: 110px; } 100% { left: 165px; bottom: 70px; } }
        @keyframes tntHopLose { 0% { left: 80px; bottom: 50px; } 50% { bottom: 110px; } 100% { left: 145px; bottom: 70px; } }
        @keyframes blastWave { 0% { transform: scale(0); opacity: 1; background-color: #ffffff; } 50% { transform: scale(1.4); opacity: 0.9; background-color: #ffcc00; } 100% { transform: scale(1.8); opacity: 0; background-color: #ff3300; } }
        
        /* Hexagon Transitions */
        @keyframes laserCageShrink {
            0% { transform: scale(1); opacity: 1; }
            70% { transform: scale(0.6); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }
        @keyframes sliceCollapse {
            0% { transform: scale(1) skewX(0deg); opacity: 1; }
            50% { transform: scaleY(0.2) skewX(30deg); opacity: 0.6; }
            100% { transform: scale(0); opacity: 0; }
        }
        @keyframes hexPrisonDash {
            0% { left: 460px; }
            100% { left: 85px; }
        }
        @keyframes panicBounce {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-8px) scale(0.95); }
        }

        @keyframes balloonPop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3) translateY(-10px); opacity: 0.8; background-color: #ff99c2; }
            100% { transform: scale(0); opacity: 0; }
        }
        @keyframes popTextEffect { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 60% { transform: translate(-50%, -100%) scale(1.3); opacity: 1; } 100% { transform: translate(-50%, -130%) scale(1); opacity: 0; } }
        @keyframes burnRight { 0% { left: 195px; width: 0px; display: block; } 100% { left: 195px; width: 265px; display: block; } }
        @keyframes sparkRunRight { 0% { left: 195px; display: block; } 100% { left: 460px; display: block; } }
        @keyframes burnLoopLeft { 0% { left: 145px; width: 0px; display: block; } 100% { left: 125px; width: 20px; display: block; } }
        @keyframes sparkRunLeft { 0% { left: 145px; display: block; } 100% { left: 105px; display: block; } }

        .dead-eyes .square-eye { background-color: transparent !important; width: 10px; height: 10px; border-radius: 0; }
        .dead-eyes .square-eye::before, .dead-eyes .square-eye::after { content: ''; position: absolute; top: 4px; left: 0; width: 10px; height: 2px; background-color: #222; }
        .dead-eyes .square-eye::before { transform: rotate(45deg); }
        .dead-eyes .square-eye::after { transform: rotate(-45deg); }

        #signal { position: absolute; left: 50%; top: 30%; transform: translateX(-50%); font-size: 80px; font-weight: bold; color: #ff3333; display: none; z-index: 50; }
        #instructions { margin-top: 20px; font-size: 18px; text-align: center; line-height: 1.5; }
        #stage-banner { font-size: 24px; font-weight: bold; margin-bottom: 5px; color: #ffd15c; }
        #flash-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: black; opacity: 0; pointer-events: none; transition: opacity 0.04s ease-in-out; z-index: 20; }
        #flash-overlay.active { opacity: 1; }
    </style>
</head>
<body>

    <div id="stage-banner">STAGE 1: THE SQUARE</div>
    <div id="stat-panel">Average Speed: <span id="avg-speed-display">0</span> ms</div>
    
    <div id="game-container">
        <div id="signal">!</div>
        <div id="glass-box"></div>
        <div id="pop-effect">POP!</div>
        <div id="tnt-crate"></div>
        <div id="tnt-plunger"></div>
        <div id="fuse-line"></div>
        <div id="fuse-spark"></div>
        <div id="explosion-cloud"></div>
        <div id="laser-grid"></div>
        <div id="honeycomb-prison"></div>
        
        <div id="player">
            <div class="ball-eyes">
                <div class="ball-eye"></div>
                <div class="ball-eye"></div>
            </div>
        </div>

        <div id="opponent">
            <div id="flames"></div>
            <div class="square-eyes">
                <div class="square-eye"></div>
                <div class="square-eye"></div>
            </div>
        </div>
    </div>

    <div id="instructions">Press **SPACEBAR** to start.<br>Wait for the "!" to strike!</div>
    <div id="flash-overlay"></div>

    <script>
        const player = document.getElementById('player');
        const opponent = document.getElementById('opponent');
        const opponentEyes = opponent.querySelector('.square-eyes');
        const signal = document.getElementById('signal');
        const instructions = document.getElementById('instructions');
        const stageBanner = document.getElementById('stage-banner');
        const flashOverlay = document.getElementById('flash-overlay');
        const glassBox = document.getElementById('glass-box');
        const popEffect = document.getElementById('pop-effect');
        const avgSpeedDisplay = document.getElementById('avg-speed-display');
        
        const tntCrate = document.getElementById('tnt-crate');
        const tntPlunger = document.getElementById('tnt-plunger');
        const fuseLine = document.getElementById('fuse-line');
        const fuseSpark = document.getElementById('fuse-spark');
        const explosionCloud = document.getElementById('explosion-cloud');
        
        const laserGrid = document.getElementById('laser-grid');
        const honeycombPrison = document.getElementById('honeycomb-prison');

        let currentStage = "SQUARE"; 
        let gameState = "IDLE"; 
        let startTimeout;
        let opponentTimeout;
        
        // Tracking System variables
        let signalTime = 0; 
        let successfulReactionTimes = []; 

        const SPEEDS = { SQUARE: 450, RHOMBUS: 350, TRIANGLE: 325, PENTAGON: 315, HEXAGON: 310 }; 

        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space') {
                handleInput();
            }
        });

        function handleInput() {
            if (gameState === "IDLE" || gameState === "OVER") {
                resetGame();
            } else if (gameState === "WAITING") {
                clearTimeout(startTimeout);
                // Perma-death rules: Fouling completely resets run records
                successfulReactionTimes = [];
                avgSpeedDisplay.innerHTML = "0";
                currentStage = "SQUARE";
                instructions.innerHTML = "Too early! FOUL! Run Reset!<br>Press SPACE to start over from Stage 1.";
                gameState = "OVER";
            } else if (gameState === "SIGNALED") {
                clearTimeout(opponentTimeout);
                
                // Track player split speed instantly
                let reflexTime = window.performance.now() - signalTime;
                successfulReactionTimes.push(reflexTime);
                
                // Calculate runtime average speed display update
                let sum = successfulReactionTimes.reduce((a, b) => a + b, 0);
                let currentAvg = Math.round(sum / successfulReactionTimes.length);
                avgSpeedDisplay.innerHTML = currentAvg;

                gameState = "OVER";
                triggerScreenSnap(true);
            }
        }

        function resetGame() {
            gameState = "WAITING";
            instructions.innerHTML = "Concentrate...";
            signal.style.display = 'none';
            
            player.className = '';
            player.removeAttribute('style');
            player.style.opacity = '1';
            player.style.bottom = '50px'; 
            player.style.left = '80px';
            
            opponent.className = '';
            opponent.removeAttribute('style'); 
            opponent.style.bottom = '50px';
            
            opponentEyes.className = 'square-eyes';
            opponentEyes.removeAttribute('style');
            glassBox.className = '';
            popEffect.className = '';

            tntCrate.style.display = 'none'; tntCrate.removeAttribute('style');
            tntPlunger.style.display = 'none'; tntPlunger.className = ''; tntPlunger.removeAttribute('style');
            fuseLine.removeAttribute('style'); fuseSpark.removeAttribute('style'); explosionCloud.className = '';
            laserGrid.className = ''; honeycombPrison.style.display = 'none';

            if (currentStage === "SQUARE") {
                stageBanner.innerHTML = "STAGE 1: THE SQUARE"; stageBanner.style.color = "#ffd15c"; opponent.style.right = '80px';
            } else if (currentStage === "RHOMBUS") {
                stageBanner.innerHTML = "STAGE 2: THE RHOMBUS"; stageBanner.style.color = "#4da6ff"; opponent.style.right = '80px'; opponent.classList.add('rhombus');
            } else if (currentStage === "TRIANGLE") {
                stageBanner.innerHTML = "STAGE 3: THE TRIANGLE"; stageBanner.style.color = "#9b5de5"; opponent.style.right = '80px'; opponent.classList.add('triangle');
            } else if (currentStage === "PENTAGON") {
                stageBanner.innerHTML = "STAGE 4: THE PENTAGON"; stageBanner.style.color = "#06d6a0"; opponent.style.right = '80px'; opponent.classList.add('pentagon');
            } else if (currentStage === "HEXAGON") {
                stageBanner.innerHTML = "FINAL STAGE: THE HEXAGON"; stageBanner.style.color = "#ff595e"; opponent.style.right = '80px'; opponent.classList.add('hexagon');
            }
            
            const randomDelay = Math.random() * 3000 + 2000;
            startTimeout = setTimeout(() => { showSignal(); }, randomDelay);
        }

        function showSignal() {
            gameState = "SIGNALED";
            signal.style.display = 'block';
            signalTime = window.performance.now(); // Stamp exact time stamp exclamation displays

            opponentTimeout = setTimeout(() => {
                gameState = "OVER";
                triggerScreenSnap(false);
            }, SPEEDS[currentStage]);
        }

        function triggerScreenSnap(playerWon) {
            flashOverlay.classList.add('active');

            setTimeout(() => {
                if (playerWon) {
                    if (currentStage === "SQUARE") {
                        opponent.style.right = 'auto'; 
                        player.classList.add('victory-leap');
                        opponent.classList.add('mid-stage-squish');
                        opponentEyes.classList.add('dead-eyes');
                        instructions.innerHTML = "✨ STAGE CLEANED! ✨<br>You squished the square! Press SPACE to fight Stage 2.";
                        currentStage = "RHOMBUS"; 
                    } else if (currentStage === "RHOMBUS") {
                        opponent.classList.add('rhombus-captured');
                        opponentEyes.classList.add('dead-eyes');
                        glassBox.classList.add('drop-down');
                        instructions.innerHTML = "💎 DIAMOND SECURED! 💎<br>You locked up the Rhombus! Press SPACE to fight Stage 3.";
                        currentStage = "TRIANGLE"; 
                    } else if (currentStage === "TRIANGLE") {
                        player.classList.add('bowling-charge');
                        setTimeout(() => {
                            opponent.classList.add('pin-blast');
                            opponentEyes.classList.add('dead-eyes');
                            popEffect.innerHTML = "STRIKE!";
                            popEffect.style.color = "#ffd15c";
                            popEffect.style.left = "460px"; 
                            popEffect.classList.add('active');
                            instructions.innerHTML = "🎳 STRIKE!!! 🎳<br>You bowled over the Triangle! Press SPACE to fight Stage 4.";
                            currentStage = "PENTAGON"; 
                        }, 550);
                    } else if (currentStage === "PENTAGON") {
                        tntPlunger.style.left = "165px"; tntPlunger.style.display = "block";
                        player.classList.add('detonator-hop-win');
                        setTimeout(() => {
                            tntPlunger.classList.add('pressed');
                            fuseLine.style.animation = "burnRight 0.5s linear forwards";
                            fuseSpark.style.animation = "sparkRunRight 0.5s linear forwards";
                            fuseLine.style.display = "block"; fuseSpark.style.display = "block";
                        }, 350);
                        setTimeout(() => {
                            opponent.style.right = 'auto'; opponent.style.left = '460px';
                            opponent.classList.add('explode-disappear'); opponentEyes.classList.add('dead-eyes');
                            explosionCloud.classList.add('boom');
                            popEffect.innerHTML = "BOOM!!!"; popEffect.style.color = "#ff3333"; popEffect.style.left = "460px"; popEffect.classList.add('active');
                            instructions.innerHTML = "🔥 PENTAGON SMASHED! 🔥<br>You blasted it to bits! Press SPACE for the FINAL SHOWDOWN.";
                            currentStage = "HEXAGON";
                        }, 850);
                    } else if (currentStage === "HEXAGON") {
                        player.classList.add('hacker-glow');
                        laserGrid.classList.add('active');
                        
                        opponent.style.right = 'auto';
                        opponent.style.left = '460px';
                        opponent.classList.add('sliced');
                        opponentEyes.classList.add('dead-eyes');

                        setTimeout(() => {
                            popEffect.innerHTML = "SLICED!";
                            popEffect.style.color = "#00f0ff";
                            popEffect.style.left = "460px";
                            popEffect.classList.add('active');
                            instructions.innerHTML = "👑 ULTIMATE DUEL CHAMPION!!! 👑<br>The Hexagon has been dismantled! Press SPACE to loop to Stage 1.";
                            currentStage = "SQUARE";
                        }, 500);
                    }
                } else {
                    // ANY DEFEAT TRIGGERS FULL ARRAY RESET + REVERSION BACK TO STAGE 1
                    let finalScore = avgSpeedDisplay.innerHTML;
                    successfulReactionTimes = [];
                    avgSpeedDisplay.innerHTML = "0";
                    currentStage = "SQUARE"; 

                    if (currentStage === "SQUARE" && opponent.classList.contains('hexagon') === false && opponent.classList.contains('pentagon') === false && opponent.classList.contains('triangle') === false && opponent.classList.contains('rhombus') === false) {
                        player.classList.add('flattened'); opponent.classList.add('jumping');
                        instructions.innerHTML = `❌ DEFEAT! Run Reset! ❌<br>Average Speed: ${finalScore} ms.<br>Press SPACE to start over from Stage 1.`;
                    } else if (opponent.classList.contains('rhombus')) {
                        opponent.style.right = 'auto'; 
                        opponent.style.left = '80px';
                        opponent.classList.add('rhombus-trampoline');
                        setTimeout(() => {
                            player.classList.add('popped'); player.style.opacity = '0'; 
                            popEffect.innerHTML = "POP!"; popEffect.style.color = "#ff3333"; popEffect.style.left = "80px"; popEffect.classList.add('active');
                        }, 600);
                        setTimeout(() => {
                            instructions.innerHTML = `🎈 POPPED! Run Reset! 🎈<br>Average Speed: ${finalScore} ms.<br>Press SPACE to start over from Stage 1.`;
                        }, 1800);
                    } else if (opponent.classList.contains('triangle')) {
                        opponent.classList.add('triangle-ram');
                        setTimeout(() => {
                            player.classList.add('popped'); player.style.opacity = '0';
                            popEffect.innerHTML = "POP!"; popEffect.style.color = "#ff3333"; popEffect.style.left = "80px"; popEffect.classList.add('active');
                            instructions.innerHTML = `📐 RAMMED! Run Reset! 📐<br>Average Speed: ${finalScore} ms.<br>Press SPACE to start over from Stage 1.`;
                        }, 350); 
                    } else if (opponent.classList.contains('pentagon')) {
                        tntCrate.style.left = "105px"; tntCrate.style.display = "flex";
                        tntPlunger.style.left = "145px"; tntPlunger.style.display = "block";
                        player.classList.add('detonator-hop-lose');
                        setTimeout(() => {
                            tntPlunger.classList.add('pressed');
                            fuseLine.style.animation = "burnLoopLeft 0.3s linear forwards"; fuseSpark.style.animation = "sparkRunLeft 0.3s linear forwards";
                            fuseLine.style.display = "block"; fuseSpark.style.display = "block";
                        }, 350);
                        setTimeout(() => {
                            player.classList.add('popped'); player.style.opacity = '0'; tntCrate.style.display = "none";
                            explosionCloud.style.left = "80px"; explosionCloud.classList.add('boom');
                            popEffect.innerHTML = "BOOM!"; popEffect.style.color = "#ff3333"; popEffect.style.left = "100px"; popEffect.classList.add('active');
                            instructions.innerHTML = `💥 BLOWN UP! Run Reset! 💥<br>Average Speed: ${finalScore} ms.<br>Press SPACE to start over from Stage 1.`;
                        }, 650);
                    } else if (opponent.classList.contains('hexagon')) {
                        opponent.classList.add('hexagon-charge');
                        setTimeout(() => {
                            honeycombPrison.style.display = 'block';
                            player.classList.add('trapped');
                            popEffect.innerHTML = "TRAPPED!"; popEffect.style.color = "#ffc300"; popEffect.style.left = "80px"; popEffect.classList.add('active');
                            instructions.innerHTML = `🐝 LOCKED UP! Run Reset! 🐝<br>Average Speed: ${finalScore} ms.<br>Press SPACE to start over from Stage 1.`;
                        }, 300);
                    }
                }
                flashOverlay.classList.remove('active');
            }, 180);
        }
    </script>
</body>
</html>
