<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Mini-Game Arcade</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Courier New', monospace;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .arcade-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 50px;
        }
        .game-card {
            background-color: #333;
            border: 3px solid #ff65a3;
            border-radius: 8px;
            width: 200px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .game-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff65a3;
        }
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body>

    <h1>🕹️ THE MINI-GAME ARCADE 🕹️</h1>
    <p>Select a game and test your skills!</p>

    <div class="arcade-container">
        <a href="games/quick-draw/index.html">
            <div class="game-card">
                <h3>🤠 Quick Draw Duel</h3>
                <p>Test your reflexes against the geometric shapes!</p>
            </div>
        </a>

        <div class="game-card" style="opacity: 0.5; border-color: #555;">
            <h3>🔒 Coming Soon</h3>
            <p>Working on the next challenge...</p>
        </div>
    </div>

</body>
</html>
